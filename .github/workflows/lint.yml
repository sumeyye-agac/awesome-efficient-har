name: lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python deps
        run: pip install pyyaml

      - name: Validate entries schema
        run: python scripts/validate_entries.py

      - name: Verify README generation is clean
        run: |
          python scripts/generate_readme.py
          git diff --exit-code -- README.md

      - name: awesome-lint
        run: npx --yes awesome-lint README.md
