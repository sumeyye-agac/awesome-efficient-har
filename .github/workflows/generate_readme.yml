name: generate-readme-check

on:
  push:
    branches: [main]
  pull_request:

jobs:
  generate-readme-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: pip install pyyaml

      - name: Regenerate README and fail on diff
        run: |
          python scripts/generate_readme.py
          if ! git diff --exit-code -- README.md; then
            echo "README.md is not up to date with data/entries.yaml."
            echo "Run: python scripts/generate_readme.py"
            exit 1
          fi
