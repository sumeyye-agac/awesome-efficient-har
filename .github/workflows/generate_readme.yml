name: generate-readme-check

on:
  push:
    branches: [main]
  pull_request:

jobs:
  generate-readme-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: pip install pyyaml

      - name: Check generated README consistency
        run: python scripts/check_generated_readme.py
